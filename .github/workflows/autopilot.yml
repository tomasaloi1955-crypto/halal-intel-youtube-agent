name: autopilot

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC = 09:00 Алматы, каждый день
  workflow_dispatch: {}    # кнопка ручного запуска

permissions:
  contents: write          # чтобы сохранять «память» обратно в репозиторий

concurrency:
  group: autopilot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить ffmpeg и шрифты
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Установить зависимости
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Запуск автопилота (один цикл)
        env:
          DATA_DIR: state
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CREDENTIALS_JSON: ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
        run: python main.py --once

      - name: Сохранить память (очередь, seen, темы) — БЕЗ токена
        if: always()
        run: |
          git config user.name "autopilot"
          git config user.email "autopilot@users.noreply.github.com"
          # добавляем только безопасные файлы состояния; youtube_token.json остаётся в .gitignore
          for f in long_queue.json seen_articles.json used_topics.json researched_topics.json; do
            [ -f "state/$f" ] && git add "state/$f"
          done
          git diff --cached --quiet && echo "нет изменений состояния" || git commit -m "state: $(date -u +%F_%H%M) [skip ci]"
          git push || echo "push пропущен"
