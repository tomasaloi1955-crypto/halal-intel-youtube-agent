name: autopilot7
on: { workflow_dispatch: {} }
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: echo "gemini=${#GEMINI_API_KEY} el=${#ELEVENLABS_API_KEY} vid=${#ELEVENLABS_VOICE_ID} pex=${#PEXELS_API_KEY} pix=${#PIXABAY_API_KEY} tg=${#TELEGRAM_BOT_TOKEN} chat=${#TELEGRAM_ALERT_CHAT_ID}"
